<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Shore GUI Mockup — Connect</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background: #0a0a0a; color: #e5e5e5; font-family: system-ui, -apple-system, sans-serif; }
</style>
</head>
<body class="min-h-screen flex flex-col">

<!-- Header (disconnected) -->
<header class="flex items-center gap-3 px-5 py-3 border-b border-neutral-800/60">
  <div class="flex items-center gap-2.5">
    <div class="w-8 h-8 rounded-full bg-neutral-800 flex items-center justify-center text-sm text-neutral-500 shrink-0">
      ?
    </div>
    <div class="leading-tight">
      <div class="text-sm font-semibold text-neutral-400">Shore</div>
      <div class="text-[11px] text-neutral-600">not connected</div>
    </div>
  </div>
  <span class="w-2 h-2 rounded-full bg-neutral-600 shrink-0" title="Disconnected"></span>
  <div class="flex-1"></div>
</header>

<!-- Center connect card -->
<div class="flex-1 flex items-center justify-center">
  <div class="w-full max-w-sm px-6">
    <div class="text-center mb-8">
      <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-indigo-500/20 to-purple-600/20 border border-indigo-500/20 flex items-center justify-center mx-auto mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="text-indigo-400"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
      </div>
      <h2 class="text-lg font-semibold">Connect to Shore</h2>
      <p class="text-sm text-neutral-500 mt-1">Enter your daemon address or leave blank for auto-discover</p>
    </div>

    <div class="space-y-3">
      <div>
        <label class="text-xs text-neutral-500 mb-1 block">Daemon address</label>
        <input
          type="text"
          placeholder="localhost:7600"
          value=""
          class="w-full bg-neutral-900 border border-neutral-700/50 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-neutral-600 placeholder:text-neutral-600"
        />
      </div>
      <button class="w-full bg-blue-600 hover:bg-blue-500 text-white text-sm font-medium py-2.5 rounded-lg transition-colors">
        Connect
      </button>
    </div>

    <p class="text-center text-[11px] text-neutral-600 mt-4">
      Shore daemon must be running &middot; <span class="text-neutral-500">shore-daemon start</span>
    </p>
  </div>
</div>

<!-- Footer (disabled) -->
<footer class="border-t border-neutral-800/60 px-5 py-3 opacity-40 pointer-events-none">
  <div class="max-w-2xl mx-auto flex items-end gap-3">
    <div class="flex-1">
      <textarea
        rows="1"
        placeholder="Connect to start chatting..."
        disabled
        class="w-full bg-neutral-900 border border-neutral-700/50 rounded-xl px-4 py-2.5 text-sm resize-none"
        style="min-height: 40px;"
      ></textarea>
    </div>
    <button disabled class="shrink-0 w-9 h-9 flex items-center justify-center rounded-xl bg-neutral-800 text-neutral-600">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4z"/><path d="M22 2 11 13"/></svg>
    </button>
  </div>
</footer>

</body>
</html>
